dependencies = [
    { name = "i3ipc" },
    { name = "imagehash" },
    { name = "numpy" },
    { name = "opencv-python-headless" },
    { name = "pillow" },
    { name = "psutil" },
    { name = "pystemd" },
    { name = "pywayland" },
    { name = "typer" },
]

[package.optional-dependencies]
dev = [
    { name = "pytest" },
    { name = "pytest-timeout" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "i3ipc", specifier = ">=2.2.1" },
    { name = "imagehash", specifier = ">=4.3.1" },
    { name = "numpy", specifier = ">=1.26.0" },
    { name = "opencv-python-headless", specifier = ">=4.9.0" },
    { name = "pillow", specifier = ">=10.0.0" },
    { name = "psutil", specifier = ">=5.9.0" },
    { name = "pystemd", specifier = ">=0.13.2" },
    { name = "pytest", marker = "extra == 'dev'", specifier = ">=8.0.0" },
    { name = "pytest-timeout", marker = "extra == 'dev'", specifier = ">=2.3.0" },
    { name = "pywayland", specifier = ">=0.4.17" },
    { name = "ruff", marker = "extra == 'dev'", specifier = ">=0.5.0" },
    { name = "typer", specifier = ">=0.12.0" },
]
provides-extras = ["dev"]
